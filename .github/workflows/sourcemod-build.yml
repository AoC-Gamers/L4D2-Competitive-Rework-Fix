name: SourceMod Build

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "channel/*"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      sourcemod_version:
        description: SourceMod version to download
        required: false
        default: "1.12"

concurrency:
  group: sourcemod-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  SOURCEMOD_VERSION: ${{ github.event.inputs.sourcemod_version || '1.12' }}
  SOURCEMOD_ARCHIVE_URL: https://www.sourcemod.net/latest.php?os=linux&version=${{ github.event.inputs.sourcemod_version || '1.12' }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install SourceMod build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes curl tar python3 make

      - name: Show SourceMod version
        run: |
          echo "SOURCEMOD_VERSION=${SOURCEMOD_VERSION}"
          echo "SOURCEMOD_ARCHIVE_URL=${SOURCEMOD_ARCHIVE_URL}"

      - name: Build SourceMod artifact
        run: bash ./scripts/ci-build-sourcemod.sh

      - name: Validate SourceMod artifact
        run: bash ./scripts/ci-validate-artifact.sh

      - name: Resolve artifact channel
        id: artifact
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#channel/}"
            release_tag="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            version="latest"
            release_tag="channel/latest"
          elif [[ "${GITHUB_REF_NAME}" == "develop" ]]; then
            version="develop"
            release_tag="channel/develop"
          else
            version="pr-${GITHUB_SHA::7}"
            release_tag=""
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "basename=l4d2-competitive-rework-fix-${version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Package SourceMod artifact
        env:
          RELEASE_BASENAME: ${{ steps.artifact.outputs.basename }}
          RELEASE_VERSION: ${{ steps.artifact.outputs.version }}
        run: bash ./scripts/ci-package-release-assets.sh

      - name: Upload release zip
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.artifact.outputs.basename }}
          path: dist/release/${{ steps.artifact.outputs.basename }}.zip
          if-no-files-found: error
          retention-days: 14

      - name: Publish release asset
        if: steps.artifact.outputs.release_tag != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.artifact.outputs.release_tag }}
          files: dist/release/${{ steps.artifact.outputs.basename }}.zip
          draft: false
          prerelease: false
