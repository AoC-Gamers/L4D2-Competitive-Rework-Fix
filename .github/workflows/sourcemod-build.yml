name: SourceMod Build

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "channel/*"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      sourcemod_version:
        description: SourceMod version to download
        required: false
        default: "1.12"

concurrency:
  group: sourcemod-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  SOURCEMOD_VERSION: ${{ github.event.inputs.sourcemod_version || '1.12' }}

jobs:
  deps-smx:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install SourceMod build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes python3 make

      - name: Resolve dependency cache key
        id: cache-key
        shell: bash
        run: |
          echo "key=smx-deps-${{ runner.os }}-${{ hashFiles('scripts/fetch-sourcemod.py', 'scripts/build-local.py', 'scripts/stage-artifact.py', 'scripts/package-release.py', 'plugin-package-map.json', 'Makefile') }}" >> "$GITHUB_OUTPUT"

      - name: Restore dependency cache
        id: deps-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: deps
          key: ${{ steps.cache-key.outputs.key }}

      - name: Fetch SourceMod dependencies
        if: steps.deps-cache-restore.outputs.cache-hit != 'true'
        run: make deps-smx PYTHON=python3 SOURCEMOD_VERSION="${SOURCEMOD_VERSION}" SMX_PLATFORM=linux

      - name: Save dependency cache
        if: steps.deps-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: deps
          key: ${{ steps.cache-key.outputs.key }}

  build-smx:
    runs-on: ubuntu-latest
    needs: deps-smx

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install SourceMod build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes python3 make

      - name: Restore dependency cache
        uses: actions/cache/restore@v5
        with:
          path: deps
          key: ${{ needs.deps-smx.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Build SMX
        run: make build-smx PYTHON=python3 SPCOMP="deps/sourcemod-linux/addons/sourcemod/scripting/spcomp"

      - name: Upload SMX build tree
        uses: actions/upload-artifact@v6
        with:
          name: smx-build
          path: .build/smx
          if-no-files-found: error
          retention-days: 1

      - name: Upload compile log
        uses: actions/upload-artifact@v6
        with:
          name: smx-compile-log
          path: deps/build-smx-compile.log
          if-no-files-found: error
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: build-smx

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install SourceMod build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes python3 make

      - name: Download SMX build tree
        uses: actions/download-artifact@v8
        with:
          name: smx-build
          path: .build/smx

      - name: Download compile log
        uses: actions/download-artifact@v8
        with:
          name: smx-compile-log
          path: deps

      - name: Package SMX tree
        run: make package-smx PYTHON=python3

      - name: Validate SourceMod artifact
        run: |
          python3 ./scripts/stage-artifact.py . ./.build/package-smx ./deps/build-smx-compile.log
          bash ./scripts/ci-validate-artifact.sh

      - name: Resolve artifact channel
        id: artifact
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#channel/}"
            release_tag="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            version="latest"
            release_tag="channel/latest"
          elif [[ "${GITHUB_REF_NAME}" == "develop" ]]; then
            version="develop"
            release_tag="channel/develop"
          else
            version="pr-${GITHUB_SHA::7}"
            release_tag=""
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "basename=l4d2-competitive-rework-fix-${version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Package SourceMod artifact
        run: make release PYTHON=python3 RELEASE_BASENAME="${{ steps.artifact.outputs.basename }}"

      - name: Upload release zip
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.artifact.outputs.basename }}
          path: dist/release/${{ steps.artifact.outputs.basename }}.zip
          if-no-files-found: error
          retention-days: 14

      - name: Publish release asset
        if: steps.artifact.outputs.release_tag != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.artifact.outputs.release_tag }}
          files: dist/release/${{ steps.artifact.outputs.basename }}.zip
          draft: false
          prerelease: false
